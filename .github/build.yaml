name: Build K-Meleon

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gyp

    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v1.1
      with:
        vs-version: '2022'

    - name: Configure build
      run: |
        cd k-meleon
        python configure.py

    - name: Build K-Meleon
      run: |
        cd k-meleon
        msbuild km.sln /p:Configuration=Release /p:Platform=Win32 /m

    - name: Create build artifacts
      if: success()
      run: |
        mkdir -p artifacts
        xcopy k-meleon\dist artifacts\kmeleon-build\ /E /I

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: kmeleon-build
        path: artifacts/
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: K-Meleon ${{ github.ref }}
        body: "K-Meleon build from ${{ github.ref }}"
        draft: false
        prerelease: false
